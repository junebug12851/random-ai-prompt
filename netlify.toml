# Netlify build for the React + Vite SPA in gui/.
# Commands run from the repo root; paths below are root-relative (no `base`, to
# avoid base-directory ambiguity). The SPA is static; the only server code is the
# stateless BYOK generation proxy under gui/netlify/functions/.

[build]
  command = "npm --prefix gui install && npm --prefix gui run build"
  publish = "gui/dist"
  functions = "gui/netlify/functions"

# Build the ONLINE variant: Generate works (BYOK via the serverless proxy), while the local-only
# features (Gallery / Single view, local SD providers, NSFW) render disabled with a link to the
# full desktop version. Vite inlines this at build time (import.meta.env.VITE_ONLINE).
[build.environment]
  VITE_ONLINE = "true"

# Route the app's /api/* calls to the serverless functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: every other path serves index.html so client routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
