# Netlify build for the React + Vite SPA in engine-v3/gui/.
# The active project lives under engine-v3/, so every path is repo-root-relative and
# spelled out as engine-v3/… (no `base`: with the netlify.toml at the repo root, the
# CLI/@netlify/build resolves publish from the root, not from base, so an explicit prefix
# is the unambiguous choice). `npm --prefix` runs the gui scripts in their own package dir.
# The deployed site is fully static — there is NO server code: BYOK requests go directly
# from the browser to the provider the user picked. (The former serverless generate/rewrite
# proxy was retired; providers that can't be called directly from a browser are disabled in
# the online build rather than relayed.)

[build]
  command = "npm --prefix engine-v3/gui install && npm --prefix engine-v3/gui run build"
  publish = "engine-v3/gui/dist"

# Build the ONLINE variant: Generate works for browser-direct providers (BYOK, called straight
# from the browser), while the local-only features (Gallery / Single view, local SD providers,
# NSFW) and any provider that would need a server render disabled with a link to the full desktop
# version. Vite inlines this at build time (import.meta.env.VITE_ONLINE).
[build.environment]
  VITE_ONLINE = "true"

# SPA fallback: every path serves index.html so client routing works. Real files in the publish
# dir (e.g. /legal/*.html, /fonts/*) are served directly and take precedence over this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
