# Netlify build for the React + Vite SPA in engine-v3/gui/.
# The active project lives under engine-v3/, so every path is repo-root-relative and
# spelled out as engine-v3/… (no `base`: with the netlify.toml at the repo root, the
# CLI/@netlify/build resolves publish/functions from the root, not from base, so an
# explicit prefix is the unambiguous choice). `npm --prefix` runs the gui scripts in
# their own package dir. The SPA is static; the only server code is the stateless BYOK
# generation proxy under engine-v3/gui/netlify/functions/.

[build]
  command = "npm --prefix engine-v3/gui install && npm --prefix engine-v3/gui run build"
  publish = "engine-v3/gui/dist"
  functions = "engine-v3/gui/netlify/functions"

# Build the ONLINE variant: Generate works (BYOK via the serverless proxy), while the local-only
# features (Gallery / Single view, local SD providers, NSFW) render disabled with a link to the
# full desktop version. Vite inlines this at build time (import.meta.env.VITE_ONLINE).
[build.environment]
  VITE_ONLINE = "true"

# Route the app's /api/* calls to the serverless functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: every other path serves index.html so client routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
