<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#1c1c1f" />
    <title>Random AI Prompt — dynamic AI image & text prompt generator</title>
    <meta
      name="description"
      content="Free, open-source AI prompt generator powered by a dynamic-prompt language that builds endless rich image & text prompts. Bring your own key — Stable Diffusion, Midjourney, Gemini, FLUX & 40+ providers."
    />
    <meta name="author" content="junebug12851" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://prompt.fairyfox.io/" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Random AI Prompt" />
    <meta property="og:url" content="https://prompt.fairyfox.io/" />
    <meta property="og:title" content="Random AI Prompt — dynamic AI image & text prompt generator" />
    <meta
      property="og:description"
      content="Describe a space of prompts in a tiny dynamic-prompt language and get endless rich, varied AI image & text prompts. Free, open-source, bring-your-own-key — 40+ providers."
    />
    <meta property="og:image" content="https://prompt.fairyfox.io/logo.png" />
    <meta property="og:image:alt" content="Random AI Prompt logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Random AI Prompt — dynamic AI image & text prompt generator" />
    <meta
      name="twitter:description"
      content="Describe a space of prompts in a tiny dynamic-prompt language and get endless rich, varied AI image & text prompts. Free, open-source, bring-your-own-key — 40+ providers."
    />
    <meta name="twitter:image" content="https://prompt.fairyfox.io/logo.png" />

    <!-- Structured data: helps search engines classify the app -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Random AI Prompt",
        "url": "https://prompt.fairyfox.io/",
        "description": "Free, open-source AI prompt generator powered by a dynamic-prompt language (DPL) that builds endless rich image and text prompts. Bring your own API key; works with 40+ providers including Stable Diffusion, Midjourney, Gemini, and FLUX.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and a modern web browser",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "junebug12851" },
        "license": "https://www.apache.org/licenses/LICENSE-2.0"
      }
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- Self-hosted fonts (no third-party request to Google). Preload the two most-used weights
         (body 400 + display 700) so first paint has them; the rest load from /fonts/fonts.css. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/maven-pro-latin-400-normal.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/space-grotesk-latin-700-normal.woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/fonts/fonts.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
