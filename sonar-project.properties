# SonarCloud (SonarQube Cloud) analysis config — bugs, code smells, duplication, security hotspots,
# maintainability / tech-debt, and coverage import. Free for public repositories.
#
# The projectKey / organization below assume SonarCloud's default naming for this GitHub account.
# When you import the repo at https://sonarcloud.io, confirm these match what it generates (it may
# use a different organization slug) and adjust if needed.
sonar.projectKey=junebug12851_random-ai-prompt
sonar.organization=junebug12851
sonar.projectName=random-ai-prompt

# What to analyze: the maintained code only (the frozen engine-v1-2/ and the huge word-list data are
# excluded to keep the analysis meaningful).
sonar.sources=engine-v3/src,engine-v3/gui/src,engine-v3/data/dynamic-prompts
sonar.tests=engine-v3/tests,engine-v3/gui/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.snapshot.test.js

# Coverage produced by the CI Vitest runs (the lcov reporter added for Codecov is reused here).
sonar.javascript.lcov.reportPaths=engine-v3/coverage/node/lcov.info,engine-v3/gui/coverage/lcov.info

# Keep frozen code, build output, generated artifacts, vendored deps, and the giant lists out.
sonar.exclusions=engine-v1-2/**,**/dist/**,**/coverage/**,**/node_modules/**,docs/**,assets/references/**,engine-v3/data/lists/**,**/*.txt
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,engine-v3/tests/**,engine-v3/gui/tests/**

sonar.sourceEncoding=UTF-8
