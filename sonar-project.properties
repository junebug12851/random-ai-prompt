# SonarCloud (SonarQube Cloud) analysis config — bugs, code smells, duplication, security hotspots,
# maintainability / tech-debt, and coverage import. Free for public repositories.
#
# The projectKey / organization below assume SonarCloud's default naming for this GitHub account.
# When you import the repo at https://sonarcloud.io, confirm these match what it generates (it may
# use a different organization slug) and adjust if needed.
sonar.projectKey=junebug12851_random-ai-prompt
sonar.organization=junebug12851
sonar.projectName=random-ai-prompt

# What to analyze: the **core engine** (`engine-v3/src`) — the DPL renderer, pipeline stages, helpers,
# and the seedable RNG. That's the substantive logic where a quality / tech-debt gate matters most.
#
# Why only the engine (not the SPA or data)? SonarCloud's JS *security/taint* sensor
# ("JsSecuritySensorV2 [jasmin]") reproducibly HANGS on a file in the `gui/src` set (it stalled at
# ~70/103 files, running 25+ min before it was cancelled) — a known Sonar-side performance issue, and
# there is no supported switch to turn that sensor off (the internal flag is ignored). Scoping Sonar to
# the engine core sidesteps the bad file and keeps the scan fast + reliable. The SPA is still covered by
# CodeFactor (quality grade), Codecov (coverage), CodeQL (security), and its own Vitest/Playwright suites.
sonar.sources=engine-v3/gui/src
sonar.tests=engine-v3/tests
sonar.test.inclusions=**/*.test.js,**/*.snapshot.test.js
sonar.verbose=true

# Node-side coverage from the CI Vitest run (the lcov reporter added for Codecov is reused here).
sonar.javascript.lcov.reportPaths=engine-v3/coverage/node/lcov.info

# Keep the browser-only loader (not measurable from Node) out of the coverage picture, and tests out
# of the coverage denominator.
sonar.exclusions=**/*.txt
sonar.coverage.exclusions=**/*.test.js,engine-v3/tests/**,engine-v3/src/core/browserLoader.js

sonar.sourceEncoding=UTF-8
