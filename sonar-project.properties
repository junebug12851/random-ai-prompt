# SonarQube Cloud (formerly SonarCloud) analysis config — bugs, code smells, duplication,
# maintainability / tech-debt, and coverage import. Free for public repositories.
#
# projectKey / organization are SonarCloud's defaults for this GitHub account; confirm on the project's
# Information page and adjust if Sonar generated a different slug.
sonar.projectKey=junebug12851_random-ai-prompt
sonar.organization=junebug12851
sonar.projectName=random-ai-prompt

# ---------------------------------------------------------------------------------------------------
# SCOPE: the core engine (`engine-v3/src`) only — the DPL renderer, pipeline stages, helpers, and the
# seedable RNG. That's the substantive logic where a quality / tech-debt gate is most valuable.
#
# Why not the SPA? SonarCloud's JS *security/taint* sensor ("JsSecuritySensorV2 [jasmin]") reproducibly
# HANGS on the SPA. This was investigated, not assumed (2026-06-30, see notes/reference/deployment.md):
#   - It is NOT one bad file: `gui/src/components/**`, `gui/src/lib/**`, and the root files each analyse
#     cleanly on their own — but the FULL `gui/src` set stalls at ~72/80 files and never finishes.
#   - So it is an INTER-FILE taint-path blow-up (the sensor is inter-procedural). Excluding the obvious
#     network source→sink files (fetch wrappers) did NOT stop it — the explosion is diffuse.
#   - It is a documented, recurring SonarSource-side performance bug (see the community threads +
#     the "Speed up JS security analysis" productboard item), with no supported property to disable or
#     time-box the sensor (`sonar.jasmin.internal.enabled=false` is ignored — confirmed in the logs).
#   - It is redundant here: security scanning is done by GitHub CodeQL (.github/workflows/codeql.yml).
# Scoping Sonar to the engine core keeps the scan reliable (the taint sensor finishes in ~3s over the 32
# core files). The SPA's quality is still covered by CodeFactor (grade), Codecov (coverage), CodeQL
# (security), and its own Vitest/Playwright suites. Revisit if SonarSource fixes the sensor.
# ---------------------------------------------------------------------------------------------------
sonar.sources=engine-v3/src
sonar.tests=engine-v3/tests
sonar.test.inclusions=**/*.test.js,**/*.snapshot.test.js

# Node-side coverage from the CI Vitest run (the lcov reporter added for Codecov is reused here).
sonar.javascript.lcov.reportPaths=engine-v3/coverage/node/lcov.info

# Keep the browser-only loader + its code-split prompt-corpus module (both pure Vite
# `import.meta.glob` wiring — a build-time macro that cannot execute under Node/Vitest) out of the
# coverage picture, and tests out of the coverage denominator. The Node Vitest config excludes the
# same two files; this mirrors that so SonarCloud does not count their lines as uncovered new code.
sonar.exclusions=**/*.txt
sonar.coverage.exclusions=**/*.test.js,engine-v3/tests/**,engine-v3/src/core/browserLoader.js,engine-v3/src/core/browserCatalogData.js

# Duplication (copy-paste) exclusions: the two browser-glob modules are mechanical `import.meta.glob`
# + `Object.entries` transform loops whose list/dynamic-prompt variants are deliberately parallel;
# their near-identical shape is not refactorable debt. They account for all of the new-code
# duplication, so exclude them from the CPD detector (they are already out of the coverage picture).
sonar.cpd.exclusions=engine-v3/src/core/browserLoader.js,engine-v3/src/core/browserCatalogData.js

# ---------------------------------------------------------------------------------------------------
# Confirmed-safe rule suppressions (reviewed 2026-07-01). These are NOT security/quality debt — each is
# a false positive for THIS codebase's context, recorded here (version-controlled + reviewable) rather
# than as inline NOSONAR comments, to match how this file already centralizes Sonar configuration.
#
#   e1/e2  S2245 (PRNG not for security): the engine's randomness generates CREATIVE PROMPTS, never
#          anything security-sensitive. `rng.js` `randomSeed()` uses crypto.getRandomValues when it is
#          available and only falls back to Math.random when it is not; `helpers/random.js` uses
#          Math.random as the deliberate unseeded/ambient source (the seeded, reproducible path is the
#          Rng class, and the test suite swaps Math.random — both REQUIRE Math.random here).
#   e3     S4158 (empty collection): `gatedDynPrompts` is an intentionally-empty, exported + tested
#          extension point (gate an adult generator that lacks an `nsfw` name token by adding it here).
#          The automatic nsfw-token rule covers every case today, so the array is empty by design.
# ---------------------------------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=**/core/rng.js
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=**/helpers/random.js
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S4158
sonar.issue.ignore.multicriteria.e3.resourceKey=**/gatedLists.js

sonar.sourceEncoding=UTF-8
