# SonarCloud (SonarQube Cloud) analysis config — bugs, code smells, duplication, security hotspots,
# maintainability / tech-debt, and coverage import. Free for public repositories.
#
# The projectKey / organization below assume SonarCloud's default naming for this GitHub account.
# When you import the repo at https://sonarcloud.io, confirm these match what it generates (it may
# use a different organization slug) and adjust if needed.
sonar.projectKey=junebug12851_random-ai-prompt
sonar.organization=junebug12851
sonar.projectName=random-ai-prompt

# What to analyze: the maintained *code* only — the core engine + the SPA's real logic. The `data/`
# generators (content that builds huge prompt strings), the frozen engine-v1-2/, and the word lists
# are excluded to keep analysis meaningful AND to avoid the JS security (taint) sensor choking on
# large/generated files (see the note below).
sonar.sources=engine-v3/src,engine-v3/gui/src
sonar.tests=engine-v3/tests,engine-v3/gui/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.snapshot.test.js

# Coverage produced by the CI Vitest runs (the lcov reporter added for Codecov is reused here).
sonar.javascript.lcov.reportPaths=engine-v3/coverage/node/lcov.info,engine-v3/gui/coverage/lcov.info

# Keep frozen code, build output, generated artifacts, vendored deps, the giant lists, the CodeMirror
# DPL grammar (heavy regex; e2e-tested), and the i18n catalogs out of analysis.
sonar.exclusions=engine-v1-2/**,**/dist/**,**/coverage/**,**/node_modules/**,docs/**,assets/references/**,engine-v3/data/**,engine-v3/gui/src/lib/dpl/**,engine-v3/gui/src/i18n/**,**/*.txt
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,engine-v3/tests/**,engine-v3/gui/tests/**

# Disable the JS security (taint) sensor — "JsSecuritySensorV2 [jasmin]". It is a known Sonar-side
# performance trap (it hung for 25 min on the first run) AND is redundant here: security scanning is
# handled by GitHub CodeQL (.github/workflows/codeql.yml). Sonar still does all the quality / bugs /
# code-smell / duplication / tech-debt analysis. (Unknown-to-Sonar properties are ignored, so the
# scope narrowing above is the guaranteed fallback if this flag is ever unsupported.)
sonar.jasmin.internal.enabled=false

sonar.sourceEncoding=UTF-8
