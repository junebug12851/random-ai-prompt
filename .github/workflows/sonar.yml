name: SonarCloud

# Deep static analysis via SonarQube Cloud (formerly SonarCloud): bugs, code smells, duplication,
# security hotspots, maintainability / tech-debt, and coverage import. Free for public repos.
#
# DORMANT until you enable it: the job only runs when the repo VARIABLE `SONAR_ENABLED` is "true".
# One-time setup:
#   1. Sign in at https://sonarcloud.io with GitHub and import 1fairyfox/random-ai-prompt.
#   2. Add a repo SECRET `SONAR_TOKEN` (from Sonar → My Account → Security).
#   3. Add a repo VARIABLE `SONAR_ENABLED` = true (Settings → Secrets and variables → Actions → Variables).
# Until then this workflow is a no-op, so it never shows a spurious red X.

# RELEASE-GATED, like the rest of CI (owner, 2026-07-12): the release PR into `main` and pushes to
# `main`, plus manual runs. Quality analysis belongs on the thing being shipped, not on every keystroke
# that lands on `dev`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab / `gh workflow run sonar.yml`

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube Cloud scan
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 # safety net — a hung sensor fails fast instead of burning ~6h of runner time
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # Sonar wants full history for accurate blame / new-code detection

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install deps + Node coverage
        run: |
          npm install --no-audit --no-fund
          npm run test:coverage

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
