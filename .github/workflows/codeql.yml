name: CodeQL

# GitHub's native SAST — scans the JavaScript/TypeScript for security issues on every push/PR to
# dev & main and weekly (to catch newly-published query updates). Findings land in the repo's
# Security → Code scanning tab. Free for public repositories. No build step: JS/TS is interpreted,
# so CodeQL analyzes the sources directly.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job below elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:javascript-typescript"
