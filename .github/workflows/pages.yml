name: Docs (GitHub Pages)

# Builds the JSDoc doc-site (the code API + the living notes wired in as tutorial pages, via
# scripts/build-docs.mjs with the docdash template) and deploys it to GitHub Pages on every
# push to main. README.md is the Pages home (jsdoc `opts.readme`).
# See notes/reference/documentation.md and notes/reference/deployment.md.
#
# One-time setup on the repo: Settings -> Pages -> Build and deployment -> Source = GitHub Actions.

# Auto-deploy on push to main (re-enabled 2026-06-29): the engine-v3-split reconciliation is done —
# build-docs.mjs now resolves notes/ + assets/ + README + jsdoc.config.json at the repo root while
# reading code (src/ + gui/) from engine-v3/, and `npm run docs` is green.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine-v3/package-lock.json

      - name: Install dependencies
        working-directory: engine-v3
        run: npm install --no-audit --no-fund

      - name: Generate docs (JSDoc + notes)
        working-directory: engine-v3
        run: npm run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          # build-docs.mjs writes the site to the REPO-ROOT docs/jsdoc (next to jsdoc.config.json),
          # and upload-pages-artifact paths are repo-root-relative (ignores working-directory).
          path: docs/jsdoc

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
