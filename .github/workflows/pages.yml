name: Docs (GitHub Pages)

# Builds the JSDoc doc-site (the code API + the living notes wired in as tutorial pages, via
# scripts/build-docs.mjs with the docdash template) and deploys it to GitHub Pages on every
# push to main. README.md is the Pages home (jsdoc `opts.readme`).
# See notes/reference/documentation.md and notes/reference/deployment.md.
#
# One-time setup on the repo: Settings -> Pages -> Build and deployment -> Source = GitHub Actions.

# NOTE: auto-deploy on push to main is PAUSED — the doc-site build (`npm run docs`) is mid-
# reconciliation to the engine-v3 split (build-docs.mjs resolves notes/ + assets/ at the repo root
# while src/ + gui/ moved under engine-v3/). Re-enable the `push: branches: [main]` trigger once
# `npm run docs` is green from engine-v3. Until then, run manually via workflow_dispatch.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine-v3/package-lock.json

      - name: Install dependencies
        working-directory: engine-v3
        run: npm install --no-audit --no-fund

      - name: Generate docs (JSDoc + notes)
        working-directory: engine-v3
        run: npm run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: engine-v3/docs/jsdoc

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
