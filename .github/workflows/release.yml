name: Release

# Software releases, version-gated. Trigger: push to main (every commit on main is a tagged release --
# a PATCH merged --no-ff straight from green dev, or a release/* / hotfix/* merge -- so it is always
# all-green). Gate: the tag v<VERSION> must not already exist -- i.e. VERSION was bumped since the last
# release. A main push that did NOT bump VERSION is a no-op (the tag already exists).
#
# Each release attaches a clean source tarball (the runnable CLI + web UI, tracked files only) and a
# docs zip (the generated JSDoc doc-site). The web SPA deploys separately via Netlify (netlify.toml).
#
# workflow_dispatch with dry_run=true builds + uploads as workflow artifacts WITHOUT publishing.
# See notes/reference/deployment.md and notes/reference/versioning.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do NOT create a GitHub Release"
        type: boolean
        default: true

# Top-level least privilege; the release job below elevates only what it needs, at job scope.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.ver.outputs.should_release }}
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    permissions:
      contents: write # create the GitHub Release + upload assets
      id-token: write # OIDC token for keyless Sigstore signing of build provenance
      attestations: write # write the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read VERSION and decide whether to release
        id: ver
        run: |
          set -euo pipefail
          version="$(grep -vE '^\s*#|^\s*$' VERSION | head -n1 | tr -d '[:space:]')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if printf '%s\n' "$version" | grep -qiE '\-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists -- nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag is new -- will release."
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.ver.outputs.should_release == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.ver.outputs.should_release == 'true'
        run: npm install --no-audit --no-fund

      - name: Verify (lint + smoke test)
        if: steps.ver.outputs.should_release == 'true'
        run: |
          npm run lint
          npm run smoke

      - name: Build the source tarball
        if: steps.ver.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          git archive --format=tar.gz --prefix="random-ai-prompt-$v/" -o "random-ai-prompt-$v.tar.gz" HEAD
          ls -la random-ai-prompt-*.tar.gz

      - name: Build docs zip (JSDoc + notes)
        if: steps.ver.outputs.should_release == 'true'
        continue-on-error: true # soft guard: a doc-site build hiccup shouldn't fail a release
        run: |
          set -euo pipefail
          npm run docs
          (cd docs/jsdoc && zip -qr "../../random-ai-prompt-${{ steps.ver.outputs.version }}-docs.zip" .)

      - name: Build the online edition bundle (self-hostable static site)
        if: steps.ver.outputs.should_release == 'true'
        env:
          VITE_ONLINE: "true"
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          npm --prefix targets/web run build
          (cd targets/web/dist && zip -qr "../../../random-ai-prompt-$v-online.zip" .)
          ls -la random-ai-prompt-*-online.zip

      - name: Compose release notes
        if: steps.ver.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          {
            echo "Random AI prompt + image generator for the Stable Diffusion WebUI -- a CLI and a local web UI."
            echo
            echo "> Pre-release software. Provided as-is under Apache-2.0."
            echo
            echo "## What's new in this release"
            echo
            prev="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
            if [ -n "$prev" ]; then
              git diff "$prev"..HEAD -- notes/version/ | grep -E '^\+' | grep -vE '^\+\+\+' | sed -E 's/^\+//' | grep -vE '^\s*$' || echo "See the changelog in notes/version/."
            else
              echo "Initial tracked release. See the changelog in notes/version/."
            fi
            echo
            echo "## How to get it"
            echo
            echo "Prefer not to build? Download a pre-built edition:"
            echo
            echo "- **Desktop app** -- Windows \`.msi\` / \`.exe\` (or a portable \`.zip\`), macOS \`.dmg\`, Linux \`.AppImage\` / \`.deb\` (attached below). Self-contained; nothing to install first."
            echo "- \`random-ai-prompt-$v-online.zip\` -- the online edition as static files; host it anywhere, or just use https://prompt.fairyfox.io."
            echo "- \`random-ai-prompt-$v.tar.gz\` -- source tarball (run with Node 24: \`npm install\` then \`npm start\`)."
            echo "- \`random-ai-prompt-$v-docs.zip\` -- the generated documentation site."
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Upload artifacts (always, for inspection / dry run)
        if: steps.ver.outputs.should_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip
            random-ai-prompt-*-online.zip

      # Cryptographically sign the release assets with SLSA build provenance (keyless, via Sigstore).
      # Produces a verifiable attestation per asset; verify with:
      #   gh attestation verify <file> --repo junebug12851/random-ai-prompt
      # Only on a real (non-dry-run) release. See notes/reference/deployment.md.
      - name: Attest build provenance for release artifacts
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip
            random-ai-prompt-*-online.zip

      # Emit a Sigstore SIGNATURE BUNDLE per asset as a release ASSET (keyless cosign 3.x). The
      # attestation above lives in the attestations API; OpenSSF Scorecard's Signed-Releases check
      # instead looks for signature files attached to the release, and it recognizes `.sigstore.json`
      # bundles (as well as `.sig` / `.sigstore` / `.intoto.jsonl`), so we name the bundle accordingly.
      # Keyless = Sigstore Fulcio/Rekor via the job's OIDC token (no keys to manage). The bundle is
      # self-contained (signature + cert + Rekor entry). Verify a downloaded asset with:
      #   cosign verify-blob --bundle <a>.sigstore.json \
      #     --certificate-identity-regexp 'https://github.com/junebug12851/random-ai-prompt/.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <a>
      - name: Install cosign
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign binary (reproducible; a floating "latest" is what silently jumped 2.x→3.x
          # and broke signing). 3.x's default new bundle format is what we now emit via `--bundle`.
          cosign-release: "v3.1.1"
      - name: Sign release artifacts (keyless cosign)
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in random-ai-prompt-*.tar.gz random-ai-prompt-*-docs.zip random-ai-prompt-*-online.zip; do
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done
          ls -la random-ai-prompt-*.sigstore.json

      - name: Publish GitHub Release
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip
            random-ai-prompt-*-online.zip
            random-ai-prompt-*.sigstore.json

  # Build the pre-built DESKTOP editions on each OS runner (Tauri can only produce a
  # platform's installer ON that platform) and attach them to the Release the job
  # above created. Runs only for a real release, after `release` succeeds. Uses the
  # runners' preinstalled Rust (no extra action to pin) and the same Sigstore signing +
  # provenance as the other assets. See notes/reference/deployment.md.
  desktop:
    name: Desktop app (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload the installers to the release
      id-token: write # OIDC token for keyless Sigstore signing + provenance
      attestations: write # write the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # Linux WebView (WebKitGTK) + AppImage tooling. Windows uses WebView2 (present on
      # the runner) and macOS uses WKWebView — neither needs extra system packages.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # The Tauri target (targets/web-shell) is its own package and carries @tauri-apps/cli; the root
      # install does not reach it, so install it explicitly before the desktop build.
      - name: Install desktop (Tauri CLI) dependencies
        run: npm --prefix targets/web-shell install --no-audit --no-fund

      # Auto-updater (Phase 2) wiring — INERT until the signing secret exists. This step decides which
      # of the two build steps below runs. With no `TAURI_SIGNING_PRIVATE_KEY` secret set (today),
      # has_key=false → the plain build runs exactly as before, so the release pipeline is unchanged.
      # Once the owner adds the keypair secret (see notes/reference/desktop-updater.md), has_key=true →
      # the updater build runs, emitting signed `.sig` update artifacts. Never both.
      - name: Detect updater signing key
        id: updkey
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "${UPDATER_KEY:-}" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      # Builds the local SPA, stages the payload (stage.mjs), then `tauri build`. Default path (no
      # in-app updater) — runs unless the updater signing key is configured.
      - name: Build the desktop app
        if: steps.updkey.outputs.has_key != 'true'
        run: npm --prefix targets/web-shell run desktop:build

      # Same build WITH the in-app updater compiled in + updater artifacts signed. Only runs once the
      # signing keypair secret is present; otherwise skipped (the plain build above runs instead).
      - name: Build the desktop app (with in-app updater)
        if: steps.updkey.outputs.has_key == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm --prefix targets/web-shell run desktop:build:updater

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.release.outputs.version }}"
          out="dist-desktop"; mkdir -p "$out"
          b="targets/web-shell/target/release/bundle"
          case "${{ matrix.os }}" in
            windows-latest)
              cp "$b"/msi/*.msi "$out/random-ai-prompt-$v-windows-x64.msi" || true
              cp "$b"/nsis/*-setup.exe "$out/random-ai-prompt-$v-windows-x64-setup.exe" || true
              # Portable: raw exe + the staged payload + a .portable marker, zipped.
              p="portable/random-ai-prompt"; mkdir -p "$p"
              cp targets/web-shell/target/release/random-ai-prompt.exe "$p/"
              cp -r targets/web-shell/app "$p/app"
              : > "$p/.portable"
              powershell -NoProfile -Command "Compress-Archive -Path portable/random-ai-prompt -DestinationPath '$out/random-ai-prompt-$v-windows-x64-portable.zip' -Force"
              ;;
            macos-latest)
              cp "$b"/dmg/*.dmg "$out/random-ai-prompt-$v-macos.dmg" || true
              ;;
            ubuntu-latest)
              cp "$b"/appimage/*.AppImage "$out/random-ai-prompt-$v-linux-x86_64.AppImage" || true
              cp "$b"/deb/*.deb "$out/random-ai-prompt-$v-linux-amd64.deb" || true
              ;;
          esac
          ls -la "$out"

      # Gather each platform's Tauri UPDATER artifact + its detached `.sig`, renamed to match the
      # installer names so the `updater-manifest` job can pair them and build `latest.json`. The
      # signature is over the artifact BYTES, so renaming the file doesn't invalidate it. Only runs on
      # the updater build. The updater artifact per OS: Windows = the NSIS `-setup.exe`, Linux = the
      # `.AppImage`, macOS = the `.app.tar.gz`. See notes/reference/desktop-updater.md.
      - name: Collect updater artifacts + signatures
        if: steps.updkey.outputs.has_key == 'true'
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.release.outputs.version }}"
          out="dist-desktop"; mkdir -p "$out"
          b="targets/web-shell/target/release/bundle"
          case "${{ matrix.os }}" in
            windows-latest)
              # setup.exe already collected as the installer; add its .sig under the matching name.
              cp "$b"/nsis/*-setup.exe.sig "$out/random-ai-prompt-$v-windows-x64-setup.exe.sig" || true
              ;;
            macos-latest)
              # The macOS updater artifact is the .app.tar.gz (NOT the .dmg) + its .sig.
              cp "$b"/macos/*.app.tar.gz "$out/random-ai-prompt-$v-macos.app.tar.gz" || true
              cp "$b"/macos/*.app.tar.gz.sig "$out/random-ai-prompt-$v-macos.app.tar.gz.sig" || true
              ;;
            ubuntu-latest)
              # AppImage already collected as the installer; add its .sig under the matching name.
              cp "$b"/appimage/*.AppImage.sig "$out/random-ai-prompt-$v-linux-x86_64.AppImage.sig" || true
              ;;
          esac
          ls -la "$out"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Sign desktop artifacts (keyless cosign)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in dist-desktop/*; do
            [ -f "$f" ] || continue
            case "$f" in *.sigstore.json) continue ;; esac
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done

      - name: Attest build provenance for the installers
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist-desktop/*.msi
            dist-desktop/*.exe
            dist-desktop/*.zip
            dist-desktop/*.dmg
            dist-desktop/*.AppImage
            dist-desktop/*.deb

      - name: Upload the installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release.outputs.tag }}" dist-desktop/* --clobber

  # Assemble the Tauri updater manifest (`latest.json`) the app's updater endpoint serves, AFTER all
  # three desktop builds have uploaded their updater artifacts + `.sig` files. Aggregates each
  # platform's signature (the `.sig` file's contents) with the download URL of its updater artifact.
  # INERT without the signing key: the `updater-key` step gates every real step, so with no secret the
  # job runs but produces nothing (matching today). Validate end-to-end on the first signed release —
  # see notes/reference/desktop-updater.md. macOS builds only the runner's arch (aarch64); add an
  # x86_64 mac matrix leg later if Intel Macs must auto-update.
  updater-manifest:
    name: Updater manifest (latest.json)
    needs: [release, desktop]
    if: needs.release.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload latest.json to the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect updater signing key
        id: updkey
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "${UPDATER_KEY:-}" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "No updater signing key — skipping latest.json (behaviour unchanged)."
          fi

      - name: Build and upload latest.json
        if: steps.updkey.outputs.has_key == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="junebug12851/random-ai-prompt"
          tag="${{ needs.release.outputs.tag }}"
          v="${{ needs.release.outputs.version }}"
          base="https://github.com/$repo/releases/download/$tag"
          mkdir -p sigs
          gh release download "$tag" -R "$repo" -p '*.sig' -D sigs || true
          notes="$(git log -1 --pretty=%s 2>/dev/null || echo "A new version is available.")"
          pubdate="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          read_sig() { [ -f "sigs/$1" ] && cat "sigs/$1" || echo ""; }
          wsig="$(read_sig "random-ai-prompt-$v-windows-x64-setup.exe.sig")"
          lsig="$(read_sig "random-ai-prompt-$v-linux-x86_64.AppImage.sig")"
          msig="$(read_sig "random-ai-prompt-$v-macos.app.tar.gz.sig")"
          jq -n \
            --arg v "$v" --arg notes "$notes" --arg date "$pubdate" \
            --arg wsig "$wsig" --arg wurl "$base/random-ai-prompt-$v-windows-x64-setup.exe" \
            --arg lsig "$lsig" --arg lurl "$base/random-ai-prompt-$v-linux-x86_64.AppImage" \
            --arg msig "$msig" --arg murl "$base/random-ai-prompt-$v-macos.app.tar.gz" \
            '{version:$v, notes:$notes, pub_date:$date, platforms: (
                {}
                + (if $wsig != "" then {"windows-x86_64": {signature:$wsig, url:$wurl}} else {} end)
                + (if $lsig != "" then {"linux-x86_64":   {signature:$lsig, url:$lurl}} else {} end)
                + (if $msig != "" then {"darwin-aarch64": {signature:$msig, url:$murl}} else {} end)
              )}' > latest.json
          cat latest.json
          if [ "$(jq '.platforms | length' latest.json)" -eq 0 ]; then
            echo "::warning::no updater signatures found — latest.json has no platforms; not uploading"
          else
            gh release upload "$tag" latest.json --clobber
          fi
