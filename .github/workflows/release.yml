name: Release

# Software releases, version-gated. Trigger: push to main (every commit on main is a tagged release --
# a PATCH merged --no-ff straight from green dev, or a release/* / hotfix/* merge -- so it is always
# all-green). Gate: the tag v<VERSION> must not already exist -- i.e. VERSION was bumped since the last
# release. A main push that did NOT bump VERSION is a no-op (the tag already exists).
#
# Each release attaches a clean source tarball (the runnable CLI + web UI, tracked files only) and a
# docs zip (the generated JSDoc doc-site). The web SPA deploys separately via Netlify (netlify.toml).
#
# workflow_dispatch with dry_run=true builds + uploads as workflow artifacts WITHOUT publishing.
# See notes/reference/deployment.md and notes/reference/versioning.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do NOT create a GitHub Release"
        type: boolean
        default: true

# Top-level least privilege; the release job below elevates only what it needs, at job scope.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
      id-token: write # OIDC token for keyless Sigstore signing of build provenance
      attestations: write # write the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read VERSION and decide whether to release
        id: ver
        run: |
          set -euo pipefail
          version="$(grep -vE '^\s*#|^\s*$' VERSION | head -n1 | tr -d '[:space:]')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if printf '%s\n' "$version" | grep -qiE '\-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists -- nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag is new -- will release."
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.ver.outputs.should_release == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.ver.outputs.should_release == 'true'
        run: npm install --no-audit --no-fund

      - name: Verify (lint + smoke test)
        if: steps.ver.outputs.should_release == 'true'
        run: |
          npm run lint
          npm run smoke

      - name: Build the source tarball
        if: steps.ver.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          git archive --format=tar.gz --prefix="random-ai-prompt-$v/" -o "random-ai-prompt-$v.tar.gz" HEAD
          ls -la random-ai-prompt-*.tar.gz

      - name: Build docs zip (JSDoc + notes)
        if: steps.ver.outputs.should_release == 'true'
        continue-on-error: true # soft guard: a doc-site build hiccup shouldn't fail a release
        run: |
          set -euo pipefail
          npm run docs
          (cd docs/jsdoc && zip -qr "../../random-ai-prompt-${{ steps.ver.outputs.version }}-docs.zip" .)

      - name: Compose release notes
        if: steps.ver.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          {
            echo "Random AI prompt + image generator for the Stable Diffusion WebUI -- a CLI and a local web UI."
            echo
            echo "> Pre-release software. Provided as-is under Apache-2.0."
            echo
            echo "## What's new in this release"
            echo
            prev="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
            if [ -n "$prev" ]; then
              git diff "$prev"..HEAD -- notes/version/ | grep -E '^\+' | grep -vE '^\+\+\+' | sed -E 's/^\+//' | grep -vE '^\s*$' || echo "See the changelog in notes/version/."
            else
              echo "Initial tracked release. See the changelog in notes/version/."
            fi
            echo
            echo "## How to get it"
            echo
            echo "- \`random-ai-prompt-$v.tar.gz\` -- source tarball (run with Node 24: \`npm install\` then \`npm start\` / \`npm run server\`)."
            echo "- \`random-ai-prompt-$v-docs.zip\` -- the generated documentation site."
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Upload artifacts (always, for inspection / dry run)
        if: steps.ver.outputs.should_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip

      # Cryptographically sign the release assets with SLSA build provenance (keyless, via Sigstore).
      # Produces a verifiable attestation per asset; verify with:
      #   gh attestation verify <file> --repo junebug12851/random-ai-prompt
      # Only on a real (non-dry-run) release. See notes/reference/deployment.md.
      - name: Attest build provenance for release artifacts
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip

      # Emit DETACHED SIGNATURES as release ASSETS (keyless cosign). The attestation above lives in the
      # attestations API; OpenSSF Scorecard's Signed-Releases check instead looks for signature files
      # attached to the release (.sig/.pem), so we ship both. Keyless = Sigstore Fulcio/Rekor via the
      # job's OIDC token (no keys to manage). Verify a downloaded asset with:
      #   cosign verify-blob --signature <a>.sig --certificate <a>.pem \
      #     --certificate-identity-regexp 'https://github.com/junebug12851/random-ai-prompt/.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <a>
      - name: Install cosign
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts (keyless cosign)
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in random-ai-prompt-*.tar.gz random-ai-prompt-*-docs.zip; do
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
          ls -la random-ai-prompt-*.sig random-ai-prompt-*.pem

      - name: Publish GitHub Release
        if: steps.ver.outputs.should_release == 'true' && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            random-ai-prompt-*.tar.gz
            random-ai-prompt-*-docs.zip
            random-ai-prompt-*.sig
            random-ai-prompt-*.pem
