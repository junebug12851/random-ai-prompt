name: Update visual baselines (Linux)

# Manually-triggered helper: regenerates the Playwright visual-regression baselines on the SAME
# environment the CI `e2e` job runs in (ubuntu-latest + Playwright's bundled chromium), so the
# committed `*-chromium-linux.png` snapshots match CI. It does NOT commit anything — it uploads the
# refreshed snapshots as artifacts; download them and commit the PNGs under
# `tests/e2e/visual.spec.js-snapshots/` (web) and `tests/e2e-mobile/visual.spec.js-snapshots/`
# (mobile). Run this whenever the stable chrome of either app changes. See notes/plans/testing.md and
# notes/reference/deployment.md.
#
# BOTH apps are covered. The mobile job used to be missing, which is why mobile visual was a
# Windows-only LOCAL gate while the web's ran in CI — a pixel gate nobody but this machine could run
# is a gate the next contributor silently loses.
#
# The project lives at the repo root. Install uses `npm install` (not `npm ci`) for the same
# Windows-lock/@emnapi reason as ci.yml.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Regenerate Linux visual baselines (web SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root + gui)
        run: |
          npm install --no-audit --no-fund
          npm --prefix targets/web install --no-audit --no-fund

      - name: Install Playwright browser (bundled chromium)
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: npx playwright test visual.spec.js --update-snapshots

      - name: Upload refreshed baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-visual-baselines
          path: tests/e2e/visual.spec.js-snapshots/
          if-no-files-found: error

  mobile:
    name: Regenerate Linux visual baselines (mobile app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root + mobile)
        run: |
          npm install --no-audit --no-fund
          npm --prefix targets/mobile install --no-audit --no-fund

      - name: Install Playwright browser (bundled chromium)
        run: npx playwright install --with-deps chromium

      # The mobile config exports the app to react-native-web and serves it
      # (scripts/serve-mobile-web.mjs) — 5 device sizes × both colour schemes.
      - name: Regenerate mobile visual baselines
        run: npx playwright test --config playwright.mobile.config.js visual.spec.js --update-snapshots

      - name: Upload refreshed mobile baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-visual-baselines-mobile
          path: tests/e2e-mobile/visual.spec.js-snapshots/
          if-no-files-found: error
