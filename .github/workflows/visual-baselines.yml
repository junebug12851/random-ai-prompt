name: Update visual baselines (Linux)

# Manually-triggered helper: regenerates the Playwright visual-regression baselines on the SAME
# environment the CI `e2e` job runs in (ubuntu-latest + Playwright's bundled chromium), so the
# committed `*-chromium-linux.png` snapshots match CI. It does NOT commit anything — it uploads the
# refreshed snapshots as an artifact ("linux-visual-baselines"); download it and commit the PNGs
# under tests/e2e/visual.spec.js-snapshots/. Run this whenever the SPA's stable chrome
# changes. See notes/plans/testing.md and notes/reference/deployment.md.
#
# The project lives at the repo root. Install uses `npm install` (not `npm ci`) for the same
# Windows-lock/@emnapi reason as ci.yml.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: Regenerate Linux visual baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root + gui)
        run: |
          npm install --no-audit --no-fund
          npm --prefix gui install --no-audit --no-fund

      - name: Install Playwright browser (bundled chromium)
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: npx playwright test visual.spec.js --update-snapshots

      - name: Upload refreshed baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-visual-baselines
          path: tests/e2e/visual.spec.js-snapshots/
          if-no-files-found: error
