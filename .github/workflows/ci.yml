name: CI

# Test-on-every-push. Mirrors the local verification gate (`npm test` = lint + format + smoke +
# the Vitest suites) plus the web-app build and the Playwright E2E / accessibility specs, so green
# here means the same thing as green locally. Visual-regression is skipped on CI on purpose: its
# baselines are committed for Windows only (`*-win32.png`) and can't match Linux rendering -- see
# playwright.config.js. See notes/plans/testing.md.
#
# The project lives in engine-v3/ (the pre-revival classic system is the frozen, separate
# engine-v1-2/ and is intentionally NOT built or tested here). Each job runs in engine-v3/ via
# defaults.run.working-directory.

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Lint, format, smoke & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Import smoke test (full ES-module graph + all dynamic prompts)
        run: npm run smoke

      - name: Unit / integration / snapshot / regression tests (Vitest, Node)
        run: npm run test:unit

  web-app:
    name: Build & unit-test the SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine-v3/web-app/package-lock.json

      - name: Install web-app dependencies
        run: npm --prefix web-app ci

      - name: Build web-app
        run: npm --prefix web-app run build

      - name: Unit / component / contract tests (Vitest, jsdom)
        run: npm --prefix web-app run test

  e2e:
    name: E2E & accessibility (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine-v3/package-lock.json

      - name: Install dependencies (root + web-app)
        run: |
          npm ci
          npm --prefix web-app ci

      - name: Install Playwright browser (bundled chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E, accessibility & visual regression
        run: npm run test:e2e
