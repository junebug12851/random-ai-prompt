<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#1c1c1f" />

    <!-- Theme boot: set data-theme on <html> before first paint so there's no
         flash of the wrong theme. Handles the default (System → follow the OS);
         the ThemeProvider then applies any explicit Dark/Light choice the user
         saved. Kept tiny + inline on purpose (must run pre-render). -->
    <script>
      (function () {
        try {
          var light =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          document.documentElement.setAttribute("data-theme", light ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>Random AI Prompt — richer AI image & text prompts, automatically</title>
    <meta
      name="description"
      content="An open-source generator that automatically builds richer, more detailed AI image & text prompts than you'd write by hand — then runs them through 40+ models including Midjourney, DALL·E, Gemini, FLUX, and Stable Diffusion."

      content="AI prompt generator, random prompt generator, Midjourney prompts, Stable Diffusion prompts, DALL-E prompts, FLUX prompts, Gemini prompts, AI art prompts, image prompt builder, text-to-image prompts, prompt engineering"

        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and a modern web browser",
        "isAccessibleForFree": true,
        "inLanguage": "en",
        "image": "https://prompt.fairyfox.io/logo.png",
        "screenshot": "https://prompt.fairyfox.io/logo.png",

    <!-- FAQ structured data: eligible for rich results and matches real, answerable questions. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Random AI Prompt?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Random AI Prompt is a free, open-source generator that automatically builds richer, more detailed AI image and text prompts than most people write by hand. You compose from a large library of scenes, subjects, and styles, then run the result through 40+ models including Midjourney, DALL-E, Gemini, FLUX, and Stable Diffusion."
            }
          },
          {
            "@type": "Question",
            "name": "Is Random AI Prompt free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The app is free and open-source under the Apache 2.0 license. Image generation is bring-your-own-key, so you only pay whichever AI provider you choose to call."
            }
          },
          {
            "@type": "Question",
            "name": "Does Random AI Prompt store my prompts or API keys?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. There are no accounts and no server relay. Your settings and API keys are stored only in your own browser or local files, and prompts are sent directly from your device to the AI provider you choose."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI image models does it support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It supports 40+ models and providers, including Midjourney, DALL-E, Google Gemini, FLUX, and Stable Diffusion, plus local Stable Diffusion backends in the desktop edition."
            }
          }
        ]
      }
    </script>

      as="font"
      type="font/woff2"

    <link
      rel="preload"
      as="font"

    <link rel="stylesheet" href="/fonts/fonts.css" />
